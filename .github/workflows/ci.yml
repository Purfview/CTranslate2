name: CI

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches:
      - master

jobs:
  build-python-wheels:
    name: Build cp310 wheels (Windows only)
    runs-on: windows-2022
    strategy:
      matrix:
        arch: [auto64]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        with:
          package-dir: python
          output-dir: python/wheelhouse
        env:
          CIBW_BUILD: cp310-*
          # skip non-windows platforms
          CIBW_SKIP: macos-* linux* aarch64 pp* *musllinux*
          CIBW_ENVIRONMENT_WINDOWS: CTRANSLATE2_ROOT='${{ github.workspace }}\install'
          CIBW_BEFORE_ALL_WINDOWS: bash python/tools/prepare_build_environment_windows.sh
          CIBW_BEFORE_BUILD: pip install -r python/install_requirements.txt
          CIBW_ARCHS: ${{ matrix.arch }}

      - name: Show built wheels (debug)
        shell: bash
        run: |
          echo "=== workspace ==="
          pwd
          echo "=== listing python/wheelhouse ==="
          ls -la python || true
          ls -la python/wheelhouse || true
          echo "=== recursive ==="
          ls -R .

      - name: Upload Python wheels (only the .whl files)
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          # upload wheel files explicitly (works cross-platform)
          path: python/wheelhouse/*.whl

  test-python-wheels:
    needs: [build-python-wheels]
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.11"

      - uses: actions/checkout@v4

      - name: Prepare test environment
        shell: bash
        run: ./python/tools/prepare_test_environment.sh

      - name: Download Python wheels artifact into python/wheelhouse
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheels
          merge-multiple: true
          path: python/wheelhouse

      - name: Show downloaded wheels (debug)
        shell: bash
        run: |
          echo "Contents of python/wheelhouse after download:"
          pwd
          ls -la python || true
          ls -la python/wheelhouse || true
          echo "All files:"
          ls -R .

      - name: Install wheel (Windows)
        shell: bash
        run: |
          # fail early if no wheels found
          echo "Installing wheels in python/wheelhouse/"
          WHEELS=(python/wheelhouse/*cp310*win*.whl)
          if [ ! -e "${WHEELS[0]}" ]; then
            echo "ERROR: no windows cp310 wheels found under python/wheelhouse/"
            echo "Listing directory:"
            ls -la python/wheelhouse || true
            exit 1
          fi
          pip install python/wheelhouse/*cp310*win*.whl

      - name: Run tests
        shell: bash
        run: pytest -v python/tests/ --ignore=python/tests/test_opennmt_tf.py

  check-python-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.11"

      - name: Install dependencies
        run: python -m pip install black==22.* flake8==3.8.* isort==5.*

      - name: Check code format with Black
        working-directory: python
        run: black --check .

      - name: Check imports order with isort
        working-directory: python
        run: isort --check-only .

      - name: Check code style with Flake8
        working-directory: python
        run: flake8 .

  publish-python-wheels-on-pypi:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: [build-python-wheels, test-python-wheels, check-python-style]
    runs-on: ubuntu-22.04

    steps:
      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheels
          merge-multiple: true
          path: python/wheelhouse

      - name: Publish Python wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: python/wheelhouse
